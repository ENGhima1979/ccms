<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>غير متصل — CCMS</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{font-family:'Cairo',sans-serif;background:#030b1f;color:#e2f0fb;
  display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;text-align:center}
.icon{font-size:80px;margin-bottom:24px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
h1{font-size:24px;font-weight:700;margin-bottom:12px}
p{color:#4a7fa5;margin-bottom:28px;font-size:15px}
button{background:linear-gradient(135deg,#00b4d8,#06ffa5);color:#000;border:none;
  padding:13px 32px;border-radius:10px;font-size:15px;cursor:pointer;font-family:'Cairo',sans-serif;font-weight:700}
</style>
</head>
<body>
<div>
  <div class="icon">📡</div>
  <h1>أنت غير متصل بالإنترنت</h1>
  <p>تحقق من اتصالك ثم حاول مجدداً<br>يمكنك الاطلاع على الصفحات المحفوظة</p>
  <button onclick="location.reload()">🔄 إعادة المحاولة</button>
</div>
</body>
</html>
